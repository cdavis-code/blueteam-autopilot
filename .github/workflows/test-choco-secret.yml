name: Test Chocolatey Secret

on:
  workflow_dispatch:

jobs:
  test-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check CHOCO_API_KEY
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          if [ -z "$CHOCO_API_KEY" ]; then
            echo "❌ CHOCO_API_KEY is NOT set"
            echo "Add it at: https://github.com/cdavis-code/blueteam-autopilot/settings/secrets/actions"
            exit 1
          else
            echo "✅ CHOCO_API_KEY is set (length: ${#CHOCO_API_KEY} chars)"
          fi
