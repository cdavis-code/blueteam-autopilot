name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v3.1.0)'
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout homebrew-blueteam repo
        uses: actions/checkout@v4
        with:
          repository: cdavis-code/homebrew-blueteam
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-blueteam

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download release tarball and compute SHA256
        id: sha256
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          URL="https://github.com/cdavis-code/blueteam-autopilot/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading: $URL"
          curl -sL "$URL" -o /tmp/release.tar.gz
          SHA=$(shasum -a 256 /tmp/release.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Update formula with new SHA256
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          FORMULA="homebrew-blueteam/Formula/blueteam-autopilot.rb"
          
          # Update the URL (matches any version tag)
          sed -i "s|url \"https://github.com/cdavis-code/blueteam-autopilot/archive/refs/tags/[^\"]*\"|url \"https://github.com/cdavis-code/blueteam-autopilot/archive/refs/tags/${TAG}.tar.gz\"|" "$FORMULA"
          
          # Update the SHA256 (matches any hash value, including empty)
          sed -i "0,/sha256 \"[^\"]*\"/s/sha256 \"[^\"]*\"/sha256 \"${SHA}\"/" "$FORMULA"
          
          echo "Updated formula:"
          head -10 "$FORMULA"

      - name: Update Python resource hashes
        run: |
          brew update-python-resources homebrew-blueteam/Formula/blueteam-autopilot.rb
          echo "Updated Python resources:"
          grep -A 2 "resource " homebrew-blueteam/Formula/blueteam-autopilot.rb | head -20

      - name: Commit and push to homebrew-blueteam
        run: |
          cd homebrew-blueteam
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/blueteam-autopilot.rb
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TAG="${{ steps.tag.outputs.tag }}"
            git commit -m "Update blueteam-autopilot to ${TAG}"
            git push
            echo "Pushed update for ${TAG}"
          fi
