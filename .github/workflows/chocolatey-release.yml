name: Chocolatey Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 3.0.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            # Extract version from tag (strip 'v' prefix)
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "${{ inputs.version }}"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building Chocolatey package for version: $version"
      
      - name: Sync version to .nuspec
        shell: pwsh
        run: |
          $nuspecPath = "pkg/chocolatey/blueteam-autopilot.nuspec"
          $content = Get-Content $nuspecPath -Raw
          $version = "${{ steps.version.outputs.version }}"
          
          # Update <version> tag
          $content = $content -replace '<version>[^<]+</version>', "<version>$version</version>"
          
          Set-Content -Path $nuspecPath -Value $content -NoNewline
          Write-Host "Updated .nuspec version to $version"
      
      - name: Install Chocolatey CLI
        shell: pwsh
        run: |
          # Chocolatey is pre-installed on windows-latest runners
          choco --version
      
      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          cd pkg/chocolatey
          choco pack blueteam-autopilot.nuspec
          
          # Verify .nupkg was created
          $nupkg = Get-ChildItem -Filter "*.nupkg" | Select-Object -First 1
          if (-not $nupkg) {
            throw "choco pack failed — no .nupkg file generated"
          }
          Write-Host "Created: $($nupkg.Name)" -ForegroundColor Green
      
      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package
          path: pkg/chocolatey/*.nupkg
          retention-days: 30
      
      - name: Push to Chocolatey Community Repository
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          if (-not $env:CHOCO_API_KEY) {
            Write-Warning "CHOCO_API_KEY secret not set — skipping push to Chocolatey Community"
            Write-Host "To enable automatic publishing, add your Chocolatey API key as CHOCO_API_KEY secret"
            exit 0
          }
          
          cd pkg/chocolatey
          $nupkg = Get-ChildItem -Filter "*.nupkg" | Select-Object -First 1
          
          if (-not $nupkg) {
            throw "No .nupkg file found in pkg/chocolatey"
          }
          
          # Push package with API key
          choco push $nupkg.FullName --source="https://push.chocolatey.org/" --api-key="$env:CHOCO_API_KEY"
          
          if ($LASTEXITCODE -ne 0) {
            throw "choco push failed with exit code $LASTEXITCODE"
          }
          
          Write-Host "Pushed $($nupkg.Name) to Chocolatey Community Repository" -ForegroundColor Green
      
      - name: Attach .nupkg to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/chocolatey/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
