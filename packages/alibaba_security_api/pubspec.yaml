name: alibaba_security_api
version: 0.1.0
description: >-
  Dart wrapper for Alibaba Cloud Security Center, Agentic SOC, and Cloud SIEM
  APIs. Provides clean interfaces for security events, alerts, vulnerabilities,
  and response policies with request signing, pagination, and LLM-friendly error
  handling.
repository: https://github.com/cdavis-code/alibaba_security_workspace
issue_tracker: https://github.com/cdavis-code/alibaba_security_workspace/issues

topics:
  - alibaba-cloud
  - security
  - mcp
  - siem

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  crypto: ^3.0.6
  dio: ^5.9.0
  json_annotation: ^4.11.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.13.0
  lints: ^6.0.0
  test: ^1.25.0
