<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Shield icon -->
  <g transform="translate(100, 90)" filter="url(#glow)">
    <path d="M40 0 L80 16 L80 48 C80 72 60 92 40 100 C20 92 0 72 0 48 L0 16 Z"
          fill="url(#shieldGrad)" opacity="0.9"/>
    <path d="M40 8 L72 22 L72 48 C72 68 55 84 40 91 C25 84 8 68 8 48 L8 22 Z"
          fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.6"/>
    <!-- Checkmark inside shield -->
    <path d="M24 50 L36 62 L58 36" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Project name -->
  <text x="210" y="138" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="700" fill="#f8fafc" filter="url(#textShadow)" letter-spacing="-1">
    Alibaba Blueteam
  </text>

  <!-- Tagline -->
  <text x="210" y="172" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="#94a3b8" letter-spacing="0.5">
    Autonomous SecOps Platform for Alibaba Cloud
  </text>

  <!-- Divider line -->
  <line x1="210" y1="190" x2="700" y2="190" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

  <!-- Action pills -->
  <g font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600">
    <!-- Triage -->
    <rect x="210" y="206" width="80" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="250" y="226" fill="#60a5fa" text-anchor="middle">Triage</text>
    <!-- Investigate -->
    <rect x="302" y="206" width="110" height="30" rx="15" fill="#06b6d4" opacity="0.15"/>
    <text x="357" y="226" fill="#22d3ee" text-anchor="middle">Investigate</text>
    <!-- Hunt -->
    <rect x="424" y="206" width="76" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="462" y="226" fill="#a78bfa" text-anchor="middle">Hunt</text>
    <!-- Monitor -->
    <rect x="512" y="206" width="96" height="30" rx="15" fill="#f59e0b" opacity="0.15"/>
    <text x="560" y="226" fill="#fbbf24" text-anchor="middle">Monitor</text>
    <!-- Report -->
    <rect x="620" y="206" width="86" height="30" rx="15" fill="#10b981" opacity="0.15"/>
    <text x="663" y="226" fill="#34d399" text-anchor="middle">Report</text>
  </g>

  <!-- Right side stats -->
  <g font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" text-anchor="end">
    <text x="1120" y="120" font-size="36" font-weight="700" fill="#3b82f6">37</text>
    <text x="1120" y="142" font-size="13" fill="#64748b">Agent Tools</text>

    <text x="1120" y="178" font-size="36" font-weight="700" fill="#06b6d4">5</text>
    <text x="1120" y="200" font-size="13" fill="#64748b">Workflows</text>

    <text x="1120" y="236" font-size="36" font-weight="700" fill="#10b981">SOC 2</text>
    <text x="1120" y="258" font-size="13" fill="#64748b">CC6.8 Compliant</text>
  </g>

  <!-- Bottom accent dots -->
  <circle cx="580" cy="278" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="600" cy="278" r="3" fill="#06b6d4" opacity="0.5"/>
  <circle cx="620" cy="278" r="3" fill="#10b981" opacity="0.5"/>
</svg>
