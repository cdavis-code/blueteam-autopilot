<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
    <linearGradient id="grc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="skill" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="demo" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#64748b"/><stop offset="100%" stop-color="#475569"/></linearGradient>
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="emb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#db2777"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f97316"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#06b6d4"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e11d48"/></marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Alibaba Blueteam — System Architecture</text>
  <text x="480" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Autonomous SOC Platform for Alibaba Cloud · v3.0</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- USER / AI HARNESS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="330" y="78" width="300" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="100" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">👤 User / AI Harness</text>
  <text x="480" y="118" text-anchor="middle" fill="#94a3b8" font-size="10">"Show me recent security events" · --daemon · --prompt</text>

  <!-- Arrow: User → Core -->
  <line x1="480" y1="130" x2="480" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CORE SKILL (center brain) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="280" y="162" width="400" height="100" rx="10" fill="url(#core)" filter="url(#shadow)"/>
  <text x="480" y="186" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ConnectOnion Agent Runtime</text>
  <text x="480" y="204" text-anchor="middle" fill="#bfdbfe" font-size="10">QwenCloudLLM · 37 built-in tools · Plugin system (HITL + audit)</text>
  <text x="480" y="222" text-anchor="middle" fill="#bfdbfe" font-size="10">MCP async bridge · Dynamic tool discovery · IR report generation</text>
  <text x="480" y="240" text-anchor="middle" fill="#bfdbfe" font-size="10">Auto-delegation → 5 specialist workflows · Daemon loop</text>
  <text x="480" y="254" text-anchor="middle" fill="#93c5fd" font-size="9">Qwen-powered agent reasoning · Textual TUI · Mode-aware dispatch</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- WORKFLOW ENGINE (new v3.0 layer) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <path d="M480,262 L480,280" stroke="#06b6d4" stroke-width="1.5" fill="none" marker-end="url(#arrowCyan)"/>

  <rect x="100" y="282" width="760" height="68" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="300" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">⚡ Workflow Engine — 5 Specialist Workflows</text>

  <!-- Workflow boxes -->
  <rect x="115" y="308" width="138" height="32" rx="4" fill="url(#wf)" opacity="0.9"/>
  <text x="184" y="322" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">incident-response</text>
  <text x="184" y="334" text-anchor="middle" fill="#cffafe" font-size="7">5 phases · reactive</text>

  <rect x="261" y="308" width="138" height="32" rx="4" fill="url(#wf)" opacity="0.9"/>
  <text x="330" y="322" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">iam-forensic</text>
  <text x="330" y="334" text-anchor="middle" fill="#cffafe" font-size="7">4 phases · IAM audit</text>

  <rect x="407" y="308" width="138" height="32" rx="4" fill="url(#wf)" opacity="0.9"/>
  <text x="476" y="322" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">threat-hunt</text>
  <text x="476" y="334" text-anchor="middle" fill="#cffafe" font-size="7">4 phases · proactive</text>

  <rect x="553" y="308" width="138" height="32" rx="4" fill="url(#wf)" opacity="0.9"/>
  <text x="622" y="322" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">compliance-audit</text>
  <text x="622" y="334" text-anchor="middle" fill="#cffafe" font-size="7">4 phases · gap analysis</text>

  <rect x="699" y="308" width="148" height="32" rx="4" fill="url(#wf)" opacity="0.9"/>
  <text x="773" y="322" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">continuous-monitor</text>
  <text x="773" y="334" text-anchor="middle" fill="#cffafe" font-size="7">3 phases · daemon-driven</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FOUR BRANCHES FROM WORKFLOW ENGINE -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Branch lines -->
  <path d="M200,350 L200,380 L140,380 L140,410" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M380,350 L380,380 L340,380 L340,410" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M580,350 L580,380 L620,380 L620,410" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M760,350 L760,380 L820,380 L820,410" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- DEMO MODE (left) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="50" y="412" width="180" height="80" rx="8" fill="url(#demo)" filter="url(#shadow)"/>
  <text x="140" y="436" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Demo Mode</text>
  <text x="140" y="452" text-anchor="middle" fill="#cbd5e1" font-size="9">SECURITY_CENTER_MODE=demo</text>
  <text x="140" y="468" text-anchor="middle" fill="#cbd5e1" font-size="9">15 bundled JSON fixtures</text>
  <text x="140" y="482" text-anchor="middle" fill="#cbd5e1" font-size="9">Zero network · Zero credentials</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- REAL MODE — ALIBABA CLOUD (center-left) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="250" y="412" width="180" height="80" rx="8" fill="url(#cloud)" filter="url(#shadow)"/>
  <text x="340" y="436" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Real Mode</text>
  <text x="340" y="452" text-anchor="middle" fill="#fed7aa" font-size="9">SECURITY_CENTER_MODE=real</text>
  <text x="340" y="468" text-anchor="middle" fill="#fed7aa" font-size="9">37 tools → 17 CLI scripts</text>
  <text x="340" y="482" text-anchor="middle" fill="#fed7aa" font-size="9">RAM auth · Region discovery</text>

  <!-- Alibaba Cloud Services sub-box -->
  <rect x="250" y="506" width="180" height="108" rx="6" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="526" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">Alibaba Cloud APIs</text>
  <text x="340" y="542" text-anchor="middle" fill="#e2e8f0" font-size="9">Security Center (SAS)</text>
  <text x="340" y="556" text-anchor="middle" fill="#e2e8f0" font-size="9">WAF 3.0 (waf-openapi)</text>
  <text x="340" y="570" text-anchor="middle" fill="#e2e8f0" font-size="9">SLS Log Service (GetLogs)</text>
  <text x="340" y="584" text-anchor="middle" fill="#e2e8f0" font-size="9">VPC (network discovery)</text>
  <text x="340" y="598" text-anchor="middle" fill="#e2e8f0" font-size="9">STS (account identity)</text>

  <line x1="340" y1="492" x2="340" y2="506" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- GRC MCP SERVERS (center-right) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="530" y="412" width="180" height="80" rx="8" fill="url(#grc)" filter="url(#shadow)"/>
  <text x="620" y="436" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">GRC MCP Servers</text>
  <text x="620" y="452" text-anchor="middle" fill="#a7f3d0" font-size="9">Live compliance data queries</text>
  <text x="620" y="468" text-anchor="middle" fill="#a7f3d0" font-size="9">CISO Assistant · Vanta (OAuth)</text>
  <text x="620" y="482" text-anchor="middle" fill="#a7f3d0" font-size="9">Alibaba Cloud MCP (uvx + stdio)</text>

  <!-- GRC Sync Pipeline sub-box -->
  <rect x="530" y="506" width="180" height="108" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="620" y="526" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">GRC Sync Pipeline</text>
  <text x="620" y="542" text-anchor="middle" fill="#e2e8f0" font-size="9">policies.json (manifest)</text>
  <text x="620" y="556" text-anchor="middle" fill="#e2e8f0" font-size="9">grc-sync.sh (orchestrator)</text>
  <text x="620" y="570" text-anchor="middle" fill="#e2e8f0" font-size="9">grc-providers/ (plugins)</text>
  <text x="620" y="584" text-anchor="middle" fill="#e2e8f0" font-size="9">grc-webhook.sh (events)</text>
  <text x="620" y="598" text-anchor="middle" fill="#e2e8f0" font-size="9">sync-log.jsonl (audit trail)</text>

  <line x1="620" y1="492" x2="620" y2="506" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- KNOWLEDGE + REPORTS (right) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="730" y="412" width="180" height="80" rx="8" fill="url(#skill)" filter="url(#shadow)"/>
  <text x="820" y="436" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Skills Layer</text>
  <text x="820" y="452" text-anchor="middle" fill="#ddd6fe" font-size="9">knowledge — NIST CSF, SOC 2</text>
  <text x="820" y="468" text-anchor="middle" fill="#ddd6fe" font-size="9">reports — incident markdown</text>
  <text x="820" y="482" text-anchor="middle" fill="#ddd6fe" font-size="9">prep — 8-stage validation</text>

  <!-- Knowledge Documents sub-box -->
  <rect x="730" y="506" width="180" height="108" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="820" y="526" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Knowledge Documents</text>
  <text x="820" y="542" text-anchor="middle" fill="#e2e8f0" font-size="9">nist-csf.md (PR.PT-4, DE.AE-2)</text>
  <text x="820" y="556" text-anchor="middle" fill="#e2e8f0" font-size="9">soc2-cc6.md (CC6.1, CC6.8)</text>
  <text x="820" y="570" text-anchor="middle" fill="#e2e8f0" font-size="9">runbook-waf-triage.md</text>
  <text x="820" y="584" text-anchor="middle" fill="#e2e8f0" font-size="9">trusted-networks.md</text>
  <text x="820" y="598" text-anchor="middle" fill="#e2e8f0" font-size="9">asset-inventory.md (dynamic)</text>

  <line x1="820" y1="492" x2="820" y2="506" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- EMBEDDINGS + MEMORY (new v3.0, bottom-left area) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="50" y="630" width="200" height="60" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="652" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="700">🧠 Vector Memory</text>
  <text x="150" y="668" text-anchor="middle" fill="#fda4af" font-size="9">text-embedding-v3 · data/blueteam.db</text>
  <text x="150" y="682" text-anchor="middle" fill="#fda4af" font-size="9">incident_embeddings · monitor_state</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- QWEN CLOUD (bottom center) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="310" y="650" width="340" height="60" rx="10" fill="#1e293b" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="674" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="700">☁ Qwen Cloud</text>
  <text x="480" y="692" text-anchor="middle" fill="#fda4af" font-size="10">Qwen LLM · Function Calling · Thinking Mode · Structured Output</text>

  <!-- Arrow: Core → Qwen Cloud -->
  <!-- <path d="M480,262 L480,650" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)" opacity="0.4"/> -->

  <!-- Label on the Qwen connection -->
  <rect x="490" y="622" width="100" height="18" rx="4" fill="#1e293b" stroke="#e11d48" stroke-width="0.5"/>
  <text x="540" y="635" text-anchor="middle" fill="#fb7185" font-size="8">Agent reasoning</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- INSTALL METHOD (bottom) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="280" y="730" width="400" height="52" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="480" y="748" text-anchor="middle" fill="#94a3b8" font-size="10"><tspan fill="#e2e8f0" font-family="monospace">git clone cdavis-code/blueteam-autopilot</tspan></text>
  <text x="480" y="762" text-anchor="middle" fill="#94a3b8" font-size="10"><tspan fill="#e2e8f0" font-family="monospace">pip install -r requirements.txt</tspan></text>
  <text x="480" y="776" text-anchor="middle" fill="#64748b" font-size="9">Standalone agent · 37 tools · 5 workflows · daemon mode · python blueteam.py</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="690" y="630" width="220" height="158" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="800" y="648" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">LEGEND</text>
  <rect x="702" y="656" width="12" height="12" rx="2" fill="url(#core)"/><text x="722" y="666" fill="#cbd5e1" font-size="8">Agent Runtime (ConnectOnion)</text>
  <rect x="702" y="674" width="12" height="12" rx="2" fill="url(#wf)"/><text x="722" y="684" fill="#cbd5e1" font-size="8">Workflow Engine (5 workflows)</text>
  <rect x="702" y="692" width="12" height="12" rx="2" fill="url(#cloud)"/><text x="722" y="702" fill="#cbd5e1" font-size="8">Alibaba Cloud (Real Mode)</text>
  <rect x="702" y="710" width="12" height="12" rx="2" fill="url(#grc)"/><text x="722" y="720" fill="#cbd5e1" font-size="8">GRC / MCP Integration</text>
  <rect x="702" y="728" width="12" height="12" rx="2" fill="url(#skill)"/><text x="722" y="738" fill="#cbd5e1" font-size="8">Skills Layer</text>
  <rect x="702" y="746" width="12" height="12" rx="2" fill="url(#demo)"/><text x="722" y="756" fill="#cbd5e1" font-size="8">Demo Mode (Offline)</text>
</svg>
