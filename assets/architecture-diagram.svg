<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
    <linearGradient id="grc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="skill" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="demo" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#64748b"/><stop offset="100%" stop-color="#475569"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Alibaba Blueteam — System Architecture</text>
  <text x="480" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">AI-Powered SecOps Copilot for Alibaba Cloud · Qwen Cloud Hackathon Track 4</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- USER / AI HARNESS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="330" y="78" width="300" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="100" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">👤 User / AI Harness</text>
  <text x="480" y="118" text-anchor="middle" fill="#94a3b8" font-size="10">"Show me recent security events"</text>

  <!-- Arrow: User → Core -->
  <line x1="480" y1="130" x2="480" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker></defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CORE SKILL (center brain) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="280" y="162" width="400" height="100" rx="10" fill="url(#core)" filter="url(#shadow)"/>
  <text x="480" y="186" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">blueteam-autopilot-core</text>
  <text x="480" y="204" text-anchor="middle" fill="#bfdbfe" font-size="10">SKILL.md · BEHAVIORS.md · 5-Behavior Triage Cycle</text>
  <text x="480" y="222" text-anchor="middle" fill="#bfdbfe" font-size="10">Mode-aware dispatch · Human-in-the-loop guardrails (SOC 2 CC6.8.3)</text>
  <text x="480" y="240" text-anchor="middle" fill="#bfdbfe" font-size="10">MCP Tool Registry · GRC Live Query Integration</text>
  <text x="480" y="254" text-anchor="middle" fill="#93c5fd" font-size="9">Qwen-powered agent reasoning</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- THREE BRANCHES FROM CORE -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Branch lines -->
  <!-- Left: Demo Mode -->
  <path d="M340,262 L340,290 L140,290 L140,320" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <!-- Center-left: Real Mode (Alibaba Cloud) -->
  <path d="M420,262 L420,290 L340,290 L340,320" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- Center-right: GRC MCP -->
  <path d="M540,262 L540,290 L620,290 L620,320" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <!-- Right: Knowledge/Reports -->
  <path d="M620,262 L620,290 L820,290 L820,320" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)"/>

  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f97316"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- DEMO MODE (left) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="50" y="322" width="180" height="80" rx="8" fill="url(#demo)" filter="url(#shadow)"/>
  <text x="140" y="346" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Demo Mode</text>
  <text x="140" y="362" text-anchor="middle" fill="#cbd5e1" font-size="9">SECURITY_CENTER_MODE=demo</text>
  <text x="140" y="378" text-anchor="middle" fill="#cbd5e1" font-size="9">14 bundled JSON fixtures</text>
  <text x="140" y="392" text-anchor="middle" fill="#cbd5e1" font-size="9">Zero network · Zero credentials</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- REAL MODE — ALIBABA CLOUD (center-left) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="250" y="322" width="180" height="80" rx="8" fill="url(#cloud)" filter="url(#shadow)"/>
  <text x="340" y="346" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Real Mode</text>
  <text x="340" y="362" text-anchor="middle" fill="#fed7aa" font-size="9">SECURITY_CENTER_MODE=real</text>
  <text x="340" y="378" text-anchor="middle" fill="#fed7aa" font-size="9">17 CLI scripts → aliyun CLI</text>
  <text x="340" y="392" text-anchor="middle" fill="#fed7aa" font-size="9">RAM auth · Region discovery</text>

  <!-- Alibaba Cloud Services sub-box -->
  <rect x="250" y="416" width="180" height="108" rx="6" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="436" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">Alibaba Cloud APIs</text>
  <text x="340" y="452" text-anchor="middle" fill="#e2e8f0" font-size="9">Security Center (SAS)</text>
  <text x="340" y="466" text-anchor="middle" fill="#e2e8f0" font-size="9">WAF 3.0 (waf-openapi)</text>
  <text x="340" y="480" text-anchor="middle" fill="#e2e8f0" font-size="9">SLS Log Service (GetLogs)</text>
  <text x="340" y="494" text-anchor="middle" fill="#e2e8f0" font-size="9">VPC (network discovery)</text>
  <text x="340" y="508" text-anchor="middle" fill="#e2e8f0" font-size="9">STS (account identity)</text>

  <line x1="340" y1="402" x2="340" y2="416" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- GRC MCP SERVERS (center-right) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="530" y="322" width="180" height="80" rx="8" fill="url(#grc)" filter="url(#shadow)"/>
  <text x="620" y="346" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">GRC MCP Servers</text>
  <text x="620" y="362" text-anchor="middle" fill="#a7f3d0" font-size="9">Live compliance data queries</text>
  <text x="620" y="378" text-anchor="middle" fill="#a7f3d0" font-size="9">CISO Assistant Community MCP</text>
  <text x="620" y="392" text-anchor="middle" fill="#a7f3d0" font-size="9">Vanta MCP Server (OAuth)</text>

  <!-- GRC Sync Pipeline sub-box -->
  <rect x="530" y="416" width="180" height="108" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="620" y="436" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">GRC Sync Pipeline</text>
  <text x="620" y="452" text-anchor="middle" fill="#e2e8f0" font-size="9">policies.json (manifest)</text>
  <text x="620" y="466" text-anchor="middle" fill="#e2e8f0" font-size="9">grc-sync.sh (orchestrator)</text>
  <text x="620" y="480" text-anchor="middle" fill="#e2e8f0" font-size="9">grc-providers/ (plugins)</text>
  <text x="620" y="494" text-anchor="middle" fill="#e2e8f0" font-size="9">grc-webhook.sh (events)</text>
  <text x="620" y="508" text-anchor="middle" fill="#e2e8f0" font-size="9">sync-log.jsonl (audit trail)</text>

  <line x1="620" y1="402" x2="620" y2="416" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- KNOWLEDGE + REPORTS (right) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="730" y="322" width="180" height="80" rx="8" fill="url(#skill)" filter="url(#shadow)"/>
  <text x="820" y="346" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Skills Layer</text>
  <text x="820" y="362" text-anchor="middle" fill="#ddd6fe" font-size="9">knowledge — NIST CSF, SOC 2</text>
  <text x="820" y="378" text-anchor="middle" fill="#ddd6fe" font-size="9">reports — incident markdown</text>
  <text x="820" y="392" text-anchor="middle" fill="#ddd6fe" font-size="9">prep — 8-stage validation</text>

  <!-- Knowledge Documents sub-box -->
  <rect x="730" y="416" width="180" height="108" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="820" y="436" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Knowledge Documents</text>
  <text x="820" y="452" text-anchor="middle" fill="#e2e8f0" font-size="9">nist-csf.md (PR.PT-4, DE.AE-2)</text>
  <text x="820" y="466" text-anchor="middle" fill="#e2e8f0" font-size="9">soc2-cc6.md (CC6.1, CC6.8)</text>
  <text x="820" y="480" text-anchor="middle" fill="#e2e8f0" font-size="9">runbook-waf-triage.md</text>
  <text x="820" y="494" text-anchor="middle" fill="#e2e8f0" font-size="9">trusted-networks.md</text>
  <text x="820" y="508" text-anchor="middle" fill="#e2e8f0" font-size="9">asset-inventory.md (dynamic)</text>

  <line x1="820" y1="402" x2="820" y2="416" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- QWEN CLOUD (bottom center) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="330" y="560" width="300" height="60" rx="10" fill="#1e293b" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="584" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="700">☁ Qwen Cloud</text>
  <text x="480" y="602" text-anchor="middle" fill="#fda4af" font-size="10">Qwen LLM · Advanced Reasoning · Agent Orchestration</text>

  <!-- Arrow: Core → Qwen Cloud -->
  <line x1="480" y1="262" x2="480" y2="290" stroke="none"/>
  <path d="M480,262 L480,560" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)" opacity="0.6"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e11d48"/></marker></defs>

  <!-- Label on the Qwen connection -->
  <rect x="490" y="530" width="100" height="18" rx="4" fill="#1e293b" stroke="#e11d48" stroke-width="0.5"/>
  <text x="540" y="543" text-anchor="middle" fill="#fb7185" font-size="8">Agent reasoning</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- INSTALL METHOD (bottom) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="280" y="640" width="400" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="480" y="658" text-anchor="middle" fill="#94a3b8" font-size="10">Install: <tspan fill="#e2e8f0" font-family="monospace">npx skills add cdavis-code/blueteam-autopilot --skill '*' -y</tspan></text>
  <text x="480" y="672" text-anchor="middle" fill="#64748b" font-size="9">No clone required · 6 skills · 17 CLI scripts · 14 demo fixtures · Node.js 18+</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="50" y="560" width="200" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="150" y="578" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">LEGEND</text>
  <rect x="62" y="586" width="12" height="12" rx="2" fill="url(#core)"/><text x="82" y="596" fill="#cbd5e1" font-size="8">Core Agent (SKILL.md)</text>
  <rect x="62" y="604" width="12" height="12" rx="2" fill="url(#cloud)"/><text x="82" y="614" fill="#cbd5e1" font-size="8">Alibaba Cloud (Real Mode)</text>
  <rect x="62" y="622" width="12" height="12" rx="2" fill="url(#grc)"/><text x="82" y="632" fill="#cbd5e1" font-size="8">GRC Integration</text>
  <rect x="62" y="640" width="12" height="12" rx="2" fill="url(#skill)"/><text x="82" y="650" fill="#cbd5e1" font-size="8">Skills Layer</text>
  <rect x="62" y="658" width="12" height="12" rx="2" fill="url(#demo)"/><text x="82" y="668" fill="#cbd5e1" font-size="8">Demo Mode (Offline)</text>
</svg>
